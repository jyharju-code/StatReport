name: Build apps

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS-AppleSilicon
            artifact: StatReport-macOS-AppleSilicon.zip
          - os: macos-13
            label: macOS-Intel
            artifact: StatReport-macOS-Intel.zip
          - os: windows-latest
            label: Windows
            artifact: StatReport-Windows.zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app + PyInstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --windowed --name StatReport \
            --osx-bundle-identifier com.jyharju.statreport \
            --collect-all matplotlib \
            --collect-all pandas \
            --collect-all statsmodels \
            --collect-all google \
            --collect-all webview \
            --collect-submodules google.genai \
            --collect-submodules tkinter \
            --collect-data certifi \
            --collect-data statreport \
            app_main.py

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/StatReport.app "${{ matrix.artifact }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/StatReport -DestinationPath "${{ matrix.artifact }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
